name: Build Better Launcher

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  # ── Linux binary (PyInstaller onefile) ───────────────────────────────────────
  # Ubuntu 22.04 gives glibc 2.35, compatible with all target distros
  # (Nobara/Fedora 38+, Mint 21+, Kubuntu 22.04+, Ultramarine).
  # We don't bundle any JRE — minecraft_launcher_lib downloads Mojang's JRE
  # into the instance dir at first run. No temp-dir JRE = no AWT crash.
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        run: echo "LAUNCHER_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            python3 python3-pip python3-tk \
            libx11-6 libxft2 libfontconfig1

      - name: Install Python deps
        run: pip3 install pyinstaller minecraft-launcher-lib requests platformdirs

      - name: Build binary
        run: |
          pyinstaller \
            --onefile \
            --name BetterLauncher \
            --hidden-import tkinter \
            --hidden-import tkinter.ttk \
            --hidden-import tkinter.font \
            --collect-submodules minecraft_launcher_lib \
            --add-data "assets/homestead.png:assets" \
            main.py
          chmod +x dist/BetterLauncher
          mv dist/BetterLauncher BetterLauncher-linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: BetterLauncher-linux-x86_64

  # ── Windows installer ─────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        shell: bash
        run: echo "LAUNCHER_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install pyinstaller minecraft-launcher-lib requests platformdirs

      - name: Download Python embeddable
        shell: pwsh
        run: |
          $url = "https://www.python.org/ftp/python/3.11.9/python-3.11.9-embed-amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile python-embed.zip
          Expand-Archive python-embed.zip -DestinationPath build\windows\python-embed
          # Enable site-packages in embedded Python
          $pthFile = Get-ChildItem "build\windows\python-embed\*._pth" | Select-Object -First 1
          (Get-Content $pthFile) -replace '#import site', 'import site' | Set-Content $pthFile

      - name: Install pip into embedded Python
        shell: pwsh
        run: |
          $python = "build\windows\python-embed\python.exe"
          Invoke-WebRequest https://bootstrap.pypa.io/get-pip.py -OutFile get-pip.py
          & $python get-pip.py
          & $python -m pip install --target "build\windows\python-embed\Lib\site-packages" `
            minecraft-launcher-lib requests platformdirs

      - name: Build stub EXE
        working-directory: build\windows
        run: |
          pyinstaller --onefile --windowed --name BetterLauncher --icon ..\..\assets\homestead.ico stub.py

      - name: Build installer
        run: |
          $env:LAUNCHER_VERSION = $env:LAUNCHER_VERSION
          iscc /Q "build\windows\setup.iss"

      - name: Rename output
        shell: pwsh
        run: |
          Move-Item "build\windows\Output\BetterLauncherSetup-*.exe" BetterLauncherSetup.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: BetterLauncherSetup.exe

  # ── GitHub Release ────────────────────────────────────────────────────────────
  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: '*'
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            BetterLauncher-linux-x86_64
            BetterLauncherSetup.exe
          generate_release_notes: true

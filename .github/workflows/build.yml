name: Build Homestead Launcher

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  # ── Linux AppImage ────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        run: echo "LAUNCHER_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            python3 python3-pip python3-tk python3-venv \
            libfuse2 wget

      - name: Install Python deps
        run: pip3 install minecraft-launcher-lib requests platformdirs

      - name: Install appimage-builder
        run: |
          wget -q https://github.com/AppImageCrafters/appimage-builder/releases/download/v1.1.0/appimage-builder-1.1.0-x86_64.AppImage
          chmod +x appimage-builder-*.AppImage
          sudo mv appimage-builder-*.AppImage /usr/local/bin/appimage-builder

      - name: Create AppDir structure
        run: |
          mkdir -p build/appimage/AppDir/usr/share/homestead
          mkdir -p build/appimage/AppDir/usr/share/icons/hicolor/256x256/apps
          cp main.py build/appimage/AppDir/usr/share/homestead/
          cp -r launcher/ build/appimage/AppDir/usr/share/homestead/launcher/
          # Placeholder icon — replace with real PNG at build/appimage/homestead.png
          if [ -f build/appimage/homestead.png ]; then
            cp build/appimage/homestead.png \
               build/appimage/AppDir/usr/share/icons/hicolor/256x256/apps/homestead.png
          fi

      - name: Build AppImage
        working-directory: build/appimage
        run: appimage-builder --recipe AppImageBuilder.yml --skip-tests

      - name: Rename output
        run: |
          mv build/appimage/Homestead-*.AppImage \
             Homestead-${{ env.LAUNCHER_VERSION }}-x86_64.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: Homestead-*.AppImage

  # ── Windows installer ─────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        shell: bash
        run: echo "LAUNCHER_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install pyinstaller minecraft-launcher-lib requests platformdirs

      - name: Download Python embeddable
        shell: pwsh
        run: |
          $url = "https://www.python.org/ftp/python/3.11.9/python-3.11.9-embed-amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile python-embed.zip
          Expand-Archive python-embed.zip -DestinationPath build\windows\python-embed
          # Enable site-packages in embedded Python
          $pthFile = Get-ChildItem "build\windows\python-embed\*._pth" | Select-Object -First 1
          (Get-Content $pthFile) -replace '#import site', 'import site' | Set-Content $pthFile

      - name: Install pip into embedded Python
        shell: pwsh
        run: |
          $python = "build\windows\python-embed\python.exe"
          Invoke-WebRequest https://bootstrap.pypa.io/get-pip.py -OutFile get-pip.py
          & $python get-pip.py
          & $python -m pip install --target "build\windows\python-embed\Lib\site-packages" `
            minecraft-launcher-lib requests platformdirs

      - name: Build stub EXE
        working-directory: build\windows
        run: |
          pyinstaller --onefile --windowed --name Homestead --icon ..\..\build\windows\homestead.ico stub.py 2>nul || echo "No icon found, building without icon"
          pyinstaller --onefile --windowed --name Homestead stub.py

      - name: Build installer
        run: |
          $env:LAUNCHER_VERSION = $env:LAUNCHER_VERSION
          iscc /Q "build\windows\setup.iss"

      - name: Rename output
        shell: pwsh
        run: |
          Move-Item "build\windows\Output\HomesteadSetup-*.exe" `
                    "HomesteadSetup-$env:LAUNCHER_VERSION.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: HomesteadSetup-*.exe

  # ── GitHub Release ────────────────────────────────────────────────────────────
  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: '*'
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Homestead-*.AppImage
            HomesteadSetup-*.exe
          generate_release_notes: true
